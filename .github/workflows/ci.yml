name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  # Dependency security is covered by the org-wide Socket.dev GitHub App
  # (Socket Security checks run on every PR). GitHub's dependency-review action
  # is intentionally omitted — it requires the repo's Dependency Graph feature
  # and would duplicate Socket's coverage.
  check:
    name: check (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lockfile integrity hash
        if: matrix.node-version == 22
        run: shasum -a 256 pnpm-lock.yaml

      - name: Audit production dependencies
        if: matrix.node-version == 22
        run: pnpm audit --prod --audit-level=high

      - name: Validate datasets (schema + integrity, all packages)
        if: matrix.node-version == 22
        run: pnpm validate

      - name: Smoke test — geoalgeria (CommonJS)
        working-directory: packages/dataset
        run: node -e "const d=require('./index.js'); const k=Object.keys(d); if(!k.length){console.error('no exports');process.exit(1)} console.log('geoalgeria exports:', k.join(', '))"

      - name: Smoke test — @geoalgeria/poste (ESM)
        working-directory: packages/poste
        run: node --input-type=module -e "import('./index.js').then(m=>{const o=m.postOffices(),a=m.atms(); if(!Array.isArray(o)||!o.length||!Array.isArray(a)||!a.length){console.error('empty data');process.exit(1)} console.log('poste:',o.length,'offices,',a.length,'atms')})"

      - name: Smoke test — @geoalgeria/mobilis (ESM)
        working-directory: packages/mobilis
        run: node --input-type=module -e "import('./index.js').then(m=>{const a=m.agences(),p=m.pdv(); if(!Array.isArray(a)||!a.length||!Array.isArray(p)||!p.length){console.error('empty data');process.exit(1)} console.log('mobilis:',a.length,'agences,',p.length,'pdv')})"

      - name: Smoke test — @geoalgeria/emploi (ESM)
        working-directory: packages/emploi
        run: node --input-type=module -e "import('./index.js').then(m=>{const w=m.awem(),l=m.alem(); if(!Array.isArray(w)||!w.length||!Array.isArray(l)||!l.length){console.error('empty data');process.exit(1)} console.log('emploi:',w.length,'awem,',l.length,'alem')})"

      - name: Smoke test — @geoalgeria/telecom (ESM)
        working-directory: packages/telecom
        run: node --input-type=module -e "import('./index.js').then(m=>{const s=m.coverage(); if(!Array.isArray(s)||!s.length){console.error('empty data');process.exit(1)} console.log('telecom:',s.length,'5G sites,',m.metadata().coverage['5G'].wilayas_covered,'wilayas')})"

      - name: Smoke test — @geoalgeria/aviation (ESM)
        working-directory: packages/aviation
        run: node --input-type=module -e "import('./index.js').then(m=>{const a=m.airports(); if(!Array.isArray(a)||!a.length){console.error('empty data');process.exit(1)} console.log('aviation:',a.length,'airports,',m.metadata().wilayas_covered,'wilayas')})"
