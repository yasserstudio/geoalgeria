name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: write # dispatch the Announce workflow after cutting each release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm >= 11.15 (staged publishing)
        run: |
          NPM_VER=$(npm --version)
          echo "Current npm: $NPM_VER"
          if [ "$(printf '%s\n' "11.15.0" "$NPM_VER" | sort -V | head -1)" != "11.15.0" ]; then
            echo "Upgrading npm for staged publishing support..."
            npm install -g npm@11.15.0
            echo "Upgraded to: $(npm --version)"
          fi

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate all packages before any publish
        run: pnpm validate

      - name: Dry-run publish
        run: |
          for pkg in packages/dataset packages/poste packages/emploi packages/mobilis packages/telecom packages/aviation packages/banques packages/livraison packages/jeunesse packages/sports packages/enseignement-superieur packages/tourisme packages/formation-professionnelle packages/djezzy packages/mosquees; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VER=$(node -p "require('./$pkg/package.json').version")
            REGISTRY_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "")
            if [ "$PKG_VER" = "$REGISTRY_VER" ]; then
              echo "--- skip: $pkg ($PKG_NAME@$PKG_VER already published) ---"
              continue
            fi
            echo "--- dry-run: $pkg ($PKG_NAME@$PKG_VER) ---"
            (cd "$pkg" && npm publish --dry-run --ignore-scripts 2>&1) || exit 1
          done

      - name: Create Release PR or Stage Packages
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release-staged
          createGithubReleases: false
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cut a per-package GitHub Release (geoalgeria@x.y.z) with the raw data
      # bundle attached — CSV/GeoJSON/SQL never ship to npm, so this is their
      # only download channel. Guarded by tag existence: fires once per new
      # version, independent of npm's staged-approval timing.
      - name: GitHub Releases + data bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # djezzy + mosquees are intentionally excluded — they shipped in the
          # combined project release (v1.4.0), not as per-package releases.
          for pkg in packages/dataset packages/poste packages/emploi packages/mobilis packages/telecom packages/aviation packages/banques packages/livraison packages/jeunesse packages/sports packages/enseignement-superieur packages/tourisme packages/formation-professionnelle; do
            NAME=$(node -p "require('./$pkg/package.json').name")
            VER=$(node -p "require('./$pkg/package.json').version")
            TAG="$NAME@$VER"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "skip: $TAG already released"
              continue
            fi
            echo "releasing: $TAG"

            BUNDLE="$RUNNER_TEMP/geoalgeria-$(basename "$pkg")-$VER.zip"
            if [ "$pkg" = "packages/dataset" ]; then
              (cd "$pkg" && zip -qr "$BUNDLE" data algeria.geojson dataset-metadata.json)
            else
              (cd "$pkg" && zip -qr "$BUNDLE" data)
            fi

            # Title + body + patch-flag come from scripts/release-notes.mjs (see
            # RELEASE_TEMPLATE.md). Title = the descriptive headline line of the
            # CHANGELOG section (falls back to the first bullet); body = the
            # ### Added/Improved/Dropped sections. The version + package scope are
            # never in the title — both are already in the release tag chip + URL.
            RN="node scripts/release-notes.mjs $pkg/CHANGELOG.md $VER $TAG"

            # Patches (docs/corrections) don't get a GitHub Release — the npm version
            # and the repo's committed data cover them, and the feed stays meaningful.
            if [ "$($RN is-patch)" = "yes" ]; then
              echo "skip release: $TAG is a patch — no GitHub Release"
              continue
            fi

            NOTES="$RUNNER_TEMP/$(basename "$NAME")-notes.md"  # basename: scoped names contain '/'
            $RN body > "$NOTES" || true

            if [ -s "$NOTES" ]; then
              TITLE=$($RN title)
              gh release create "$TAG" --title "$TITLE" --target "$GITHUB_SHA" --notes-file "$NOTES" "$BUNDLE"
            else
              echo "::warning::No CHANGELOG section found for $TAG; using auto-generated notes"
              gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes "$BUNDLE"
            fi

            # Announce this release. The release: published event won't fire (this
            # release was created with GITHUB_TOKEN, which GitHub suppresses to avoid
            # recursion), so dispatch Announce explicitly — workflow_dispatch is the
            # documented exception GITHUB_TOKEN is allowed to trigger.
            gh workflow run announce.yml -f tag="$TAG" \
              || echo "::warning::Could not dispatch Announce for $TAG — run it by hand (Actions tab → Announce)."
          done
